<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Matrix | Anthony R. Ball</title>
    <meta name="description" content="Academic preparations, transcripts, and degree architecture for Anthony R. Ball.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* LIGHT MODE VARIABLES */
        :root {
            --bg-color: #f4f7f6;        
            --text-main: #0d1b2a;       
            --text-muted: #4a5568;
            --card-bg: #ffffff;         
            --btn-bg: #f4f7f6;          
            --btn-text: #0d1b2a;        
            --btn-hover: #00838f;       
            --btn-hover-text: #ffffff;  
            --accent-color: #00838f;    
            --border-color: #e0e0e0;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            
            /* Status Dot Colors */
            --dot-complete: #2e7d32;
            --dot-progress: #f57f17;
            --dot-waived: #1565c0;
        }

        /* DARK MODE VARIABLES */
        body.dark-mode {
            --bg-color: #121212;        
            --text-main: #e0e0e0;       
            --text-muted: #a0aec0;
            --card-bg: #1e1e1e;         
            --btn-bg: #2d2d2d;          
            --btn-text: #e0e0e0;        
            --btn-hover: #00acc1;       
            --btn-hover-text: #121212;  
            --accent-color: #00acc1;    
            --border-color: #333333;
            --shadow: 0 4px 15px rgba(0,0,0,0.3);

            /* Muted Status Dot Colors for Dark Mode */
            --dot-complete: #4caf50;
            --dot-progress: #ffb300;
            --dot-waived: #4fc3f7;
        }

        /* CORE PAGE STRUCTURE */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* WHATSAPP-STYLE BACKGROUND OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
